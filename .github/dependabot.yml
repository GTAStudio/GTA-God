version: 2
updates:
  - package-ecosystem: cargo
    directory: /gateway
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      rust-runtime:
        patterns:
          - tokio
          - reqwest
          - rustls*
          - instant-acme
          - x509-parser

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7