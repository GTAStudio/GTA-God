name: Build and Push GTAGod Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'healthcheck.sh'
      - 'bin/**'
      - 'gateway/**'
      - 'singbox-config.*.example'
      - 'gtagod.conf.example'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (no cache)'
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

# =========================================
# GTAGod v0.1.8 - Pure Rust 统一架构
# =========================================
#
# 架构:
#   - gtagate (Rust musl): L4 SNI 分流 + ACME + splice(2) 零拷贝
#   - gtacore (Rust glibc): naive + anytls + anyreality
#
# =========================================

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          tags: |
            type=raw,value=latest
            type=raw,value=v0.1.8
            type=raw,value=gtacore-0.1.8-{{date 'YYYYMMDD'}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          echo "🔍 Verifying GTAGod v0.1.8 image..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest

          echo "📦 Checking gtagate..."
          docker run --rm --entrypoint gtagate ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest --version

          echo "📦 Checking gtacore..."
          docker run --rm --entrypoint gtacore ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest sing-box version

          echo "✅ GTAGod v0.1.8 verification passed!"
          echo "   - gtagate: L4 SNI + ACME + splice(2) zero-copy"
          echo "   - gtacore: naive + anytls + anyreality"
