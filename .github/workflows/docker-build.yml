name: Build and Deploy GTAGod

on:
  # push:
  #   branches: [main, master]
  #   paths:
  #     - 'Dockerfile'
  #     - 'docker-entrypoint.sh'
  #     - '.github/workflows/docker-build.yml'
  workflow_dispatch:  # Manual trigger only - 只能手动触发
    inputs:
      caddy_version:
        description: 'Caddy version (default: v2.11.1)'
        required: false
        default: 'v2.11.1'
      singbox_version:
        description: 'sing-box version (e.g. 1.13.2)'
        required: false
        default: '1.13.2'
      force_rebuild:
        description: 'Force rebuild (no cache)'
        required: false
        type: boolean
        default: false

# =========================================
# GTAGod v4.1.0 - sing-box 1.13+ 统一架构
# =========================================
# 
# sing-box 1.13+ 原生支持 naive inbound
# 不再需要 Caddy forwardproxy 插件
#
# 架构:
#   - Caddy: L4 SNI 分流 + ACME 证书申请
#   - sing-box 1.13+: naive + anytls + anyreality
#
# =========================================

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          tags: |
            type=raw,value=latest
            type=raw,value=v4.1.0
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,prefix={{date 'YYYYMMDD'}}-
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CADDY_VERSION=${{ github.event.inputs.caddy_version || 'v2.11.1' }}
            SINGBOX_VERSION=${{ github.event.inputs.singbox_version || '1.13.2' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Verify image
        run: |
          echo "🔍 Verifying GTAGod v4.1.0 image..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest
          
          echo "📦 Checking Caddy..."
          docker run --rm --entrypoint caddy ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest version
          
          echo "📦 Checking Caddy modules (layer4 + cloudflare)..."
          docker run --rm --entrypoint caddy ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest list-modules | grep -E "(layer4|cloudflare)"
          
          echo "📦 Checking sing-box 1.13+ (native naive inbound)..."
          docker run --rm --entrypoint sing-box ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest version
          
          echo "✅ GTAGod v4.1.0 image verification passed!"
          echo "   - Caddy with layer4 + cloudflare modules"
          echo "   - sing-box 1.13+ with native naive inbound"
          echo "   - No external forwardproxy needed!"
