name: Build and Push GTAGod Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'healthcheck.sh'
      - 'bin/**'
      - 'gateway/**'
      - 'singbox-config.*.example'
      - 'gtagod.conf.example'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (no cache)'
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

# =========================================
# GTAGod v0.1.8 - Pure Rust 统一架构
# =========================================
#
# 架构:
#   - gtagate (Rust musl): L4 SNI 分流 + ACME + splice(2) 零拷贝
#   - gtacore (Rust glibc): naive + anytls + anyreality
#
# =========================================

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # cosign keyless（Sigstore/Fulcio）签名所需（OIDC）
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Read gtacore version (single source of truth)
        id: gtacore
        run: |
          chmod +x bin/gtacore
          ver=$(./bin/gtacore sing-box version | head -1 | awk '{print $3}')
          if [ -z "$ver" ]; then echo "FATAL: cannot read gtacore version"; exit 1; fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Detected gtacore version: ${ver}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.gtacore.outputs.version }}
            type=raw,value=gtacore-${{ steps.gtacore.outputs.version }}-{{date 'YYYYMMDD'}}
            type=sha,prefix=
          # 显式设 OCI version label=gtacore 版本，覆盖 metadata-action 默认从首个 tag(latest)推导的 version（否则 CLI --label 会把镜像 version label 准为 latest）。
          labels: |
            org.opencontainers.image.version=${{ steps.gtacore.outputs.version }}
            org.opencontainers.image.title=gtagod
            org.opencontainers.image.description=GTAGod - GTACore (Rust) naive+anytls+anyreality + gtagate L4
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          build-args: |
            GTAGOD_VERSION=${{ steps.gtacore.outputs.version }}
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          echo "🔍 Verifying GTAGod v${{ steps.gtacore.outputs.version }} image..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest

          echo "📦 Checking gtagate..."
          docker run --rm --entrypoint gtagate ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest --version

          echo "📦 Checking gtacore..."
          docker run --rm --entrypoint gtacore ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:latest sing-box version

          echo "✅ GTAGod v${{ steps.gtacore.outputs.version }} verification passed!"
          echo "   - gtagate: L4 SNI + ACME + splice(2) zero-copy"
          echo "   - gtacore: naive + anytls + anyreality"

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless Sigstore/Fulcio)
        if: github.event_name != 'pull_request'
        continue-on-error: true   # 签名失败不阻断已完成的 push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          echo "🔐 Keyless signing image with cosign (Sigstore/Fulcio/Rekor)..."
          images=""
          for tag in ${TAGS}; do
            images="${images}${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
          echo "✅ Signed. 任意用户可验签（无需密钥）:"
          echo "   cosign verify ${{ secrets.DOCKERHUB_USERNAME }}/gtagod@${DIGEST} \\"
          echo "     --certificate-identity-regexp '.*/GTA-God/.github/workflows/docker-build.yml@.*' \\"
          echo "     --certificate-oidc-issuer https://token.actions.githubusercontent.com"
