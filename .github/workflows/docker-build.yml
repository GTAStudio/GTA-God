name: Build and Push GTAGod Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'healthcheck.sh'
      - 'bin/**'
      - 'gateway/**'
      - 'singbox-config.*.example'
      - 'gtagod.conf.example'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (no cache)'
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

# =========================================
# GTAGod v0.1.8 - Pure Rust 统一架构
# =========================================
#
# 架构:
#   - gtagate (Rust musl): L4 SNI 分流 + ACME + splice(2) 零拷贝
#   - gtacore (Rust glibc): naive + anytls + anyreality
#
# =========================================

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write   # cosign keyless（Sigstore/Fulcio）签名所需（OIDC）
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # 后续无 git 推送，不让 GITHUB_TOKEN 驻留 .git/config

      - name: Read gtacore version (single source of truth)
        id: gtacore
        run: |
          chmod +x bin/gtacore
          ver=$(./bin/gtacore sing-box version | head -1 | awk '{print $3}')
          if [ -z "$ver" ]; then echo "FATAL: cannot read gtacore version"; exit 1; fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Detected gtacore version: ${ver}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.gtacore.outputs.version }}
            type=raw,value=gtacore-${{ steps.gtacore.outputs.version }}-{{date 'YYYYMMDD'}}
            type=sha,prefix=
          # 显式设 OCI version label=gtacore 版本，覆盖 metadata-action 默认从首个 tag(latest)推导的 version（否则 CLI --label 会把镜像 version label 准为 latest）。
          labels: |
            org.opencontainers.image.version=${{ steps.gtacore.outputs.version }}
            org.opencontainers.image.title=gtagod
            org.opencontainers.image.description=GTAGod - GTACore (Rust) naive+anytls+anyreality + gtagate L4
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          build-args: |
            GTAGOD_VERSION=${{ steps.gtacore.outputs.version }}
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod@${{ steps.push.outputs.digest }}
        run: |
          echo "🔍 Verifying GTAGod v${{ steps.gtacore.outputs.version }} image (by digest)..."
          docker pull "$IMAGE"

          echo "📦 Checking gtagate..."
          docker run --rm --entrypoint gtagate "$IMAGE" --version

          echo "📦 Checking gtacore..."
          docker run --rm --entrypoint gtacore "$IMAGE" sing-box version

          echo "✅ GTAGod v${{ steps.gtacore.outputs.version }} verification passed!"
          echo "   - gtagate: L4 SNI + ACME + splice(2) zero-copy"
          echo "   - gtacore: naive + anytls + anyreality"

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless Sigstore/Fulcio)
        id: sign
        if: github.event_name != 'pull_request'
        continue-on-error: true   # 签名失败不阻断已完成的 push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          echo "🔐 Keyless signing image with cosign (Sigstore/Fulcio/Rekor)..."
          images=""
          for tag in ${TAGS}; do
            images="${images}${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
          echo "✅ Signed."

      - name: Verify signature (cosign verify, fail-closed)
        # 仅在签名成功后执行；签名成功却验签失败说明签名链有问题，此时严格 fail（不
        # continue-on-error），以免发布出「看似已签名实则无法验证」的镜像（供应链安全：sign-then-verify）。
        if: github.event_name != 'pull_request' && steps.sign.outcome == 'success'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
        run: |
          echo "🔍 Verifying cosign keyless signature for ${IMAGE_REPO}@${DIGEST}..."
          cosign verify "${IMAGE_REPO}@${DIGEST}" \
            --certificate-identity-regexp '.*/GTA-God/.github/workflows/docker-build.yml@.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          echo "✅ Signature verified. 任意用户可复现验签:"
          echo "   cosign verify ${IMAGE_REPO}@${DIGEST} \\"
          echo "     --certificate-identity-regexp '.*/GTA-God/.github/workflows/docker-build.yml@.*' \\"
          echo "     --certificate-oidc-issuer https://token.actions.githubusercontent.com"
