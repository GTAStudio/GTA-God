name: Validate and Publish GTAGod

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'healthcheck.sh'
      - 'bin/**'
      - 'gateway/**'
      - 'tests/**'
      - '.dockerignore'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (no cache)'
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.97.0

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck jq openssl binutils
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal \
            --component clippy --component rustfmt

      - name: Verify tracked release artifact
        run: |
          chmod +x bin/gtacore
          sh tests/verify-release-artifact.sh

      - name: Validate shell behavior
        run: |
          dash -n docker-entrypoint.sh
          dash -n healthcheck.sh
          dash -n tests/shell-behavior.sh
          dash -n tests/protocol-matrix.sh
          dash -n tests/verify-release-artifact.sh
          bash -n tests/gateway-stress.sh
          shellcheck --shell=dash --severity=warning \
            docker-entrypoint.sh healthcheck.sh \
            tests/shell-behavior.sh tests/protocol-matrix.sh \
            tests/verify-release-artifact.sh
          shellcheck --shell=bash --severity=warning tests/gateway-stress.sh
          sh tests/shell-behavior.sh
          sh tests/protocol-matrix.sh

      - name: Test gtagate
        working-directory: gateway
        run: |
          cargo +"$RUST_TOOLCHAIN" fmt --all -- --check
          cargo +"$RUST_TOOLCHAIN" test --locked --all-targets
          cargo +"$RUST_TOOLCHAIN" clippy --locked --all-targets -- -D warnings

      - name: Stress gtagate data plane
        env:
          GATEWAY_STRESS_REQUESTS: 256
          GATEWAY_STRESS_CONCURRENCY: 32
        run: bash tests/gateway-stress.sh

  candidate-image:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Read gtacore version
        id: gtacore
        run: |
          chmod +x bin/gtacore
          ver=$(./bin/gtacore sing-box version | awk 'NR == 1 { print $3 }')
          commit=$(python3 -c 'import json; print(json.load(open("bin/gtacore.provenance.json", encoding="utf-8"))["commit"])')
          test -n "$ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build local candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          build-args: |
            GTAGOD_VERSION=${{ steps.gtacore.outputs.version }}
            GTACORE_REVISION=${{ steps.gtacore.outputs.commit }}
          tags: gtagod:candidate-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run candidate container smoke
        env:
          IMAGE: gtagod:candidate-${{ github.sha }}
        run: |
          container=gtagod-candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          cleanup() {
            docker rm -f "$container" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run -d --name "$container" \
            --cap-drop=ALL \
            --cap-add=NET_BIND_SERVICE \
            --mount type=bind,src="$PWD/tests/fixtures/gtagate-smoke.json",dst=/etc/gtagate/config.json,readonly \
            --mount type=bind,src="$PWD/tests/fixtures/gtacore-smoke.json",dst=/etc/gtacore/config.json,readonly \
            "$IMAGE"
          ready=false
          for attempt in $(seq 1 90); do
            if docker exec "$container" /usr/local/bin/healthcheck.sh; then
              ready=true
              break
            fi
            if ! docker inspect -f '{{.State.Running}}' "$container" | grep -qx true; then
              docker logs "$container"
              exit 1
            fi
            sleep 1
          done
          if [ "$ready" != true ]; then
            docker logs "$container"
            exit 1
          fi
          docker exec "$container" gtagate --version
          docker exec "$container" gtacore sing-box version
          docker stop --time 10 "$container"

  publish:
    needs: [validate, candidate-image]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Read gtacore version
        id: gtacore
        run: |
          chmod +x bin/gtacore
          ver=$(./bin/gtacore sing-box version | awk 'NR == 1 { print $3 }')
          commit=$(python3 -c 'import json; print(json.load(open("bin/gtacore.provenance.json", encoding="utf-8"))["commit"])')
          test -n "$ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare release metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.gtacore.outputs.version }}
            type=raw,value=gtacore-${{ steps.gtacore.outputs.version }}-{{date 'YYYYMMDD'}}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.version=${{ steps.gtacore.outputs.version }}
            org.opencontainers.image.title=gtagod
            org.opencontainers.image.description=GTAGod - GTACore ${{ steps.gtacore.outputs.version }} nine-protocol server + gtagate L4
            org.opencontainers.image.licenses=MIT

      - name: Build and push immutable candidate
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          build-args: |
            GTAGOD_VERSION=${{ steps.gtacore.outputs.version }}
            GTACORE_REVISION=${{ steps.gtacore.outputs.commit }}
          provenance: mode=max
          sbom: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:candidate-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed candidate by digest
        env:
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          image="${IMAGE_REPO}@${DIGEST}"
          docker pull "$image"
          container=gtagod-pushed-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          cleanup() {
            docker rm -f "$container" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run -d --name "$container" \
            --cap-drop=ALL \
            --cap-add=NET_BIND_SERVICE \
            --mount type=bind,src="$PWD/tests/fixtures/gtagate-smoke.json",dst=/etc/gtagate/config.json,readonly \
            --mount type=bind,src="$PWD/tests/fixtures/gtacore-smoke.json",dst=/etc/gtacore/config.json,readonly \
            "$image"
          ready=false
          for attempt in $(seq 1 30); do
            if docker exec "$container" /usr/local/bin/healthcheck.sh; then
              ready=true
              break
            fi
            if ! docker inspect -f '{{.State.Running}}' "$container" | grep -qx true; then
              docker logs "$container"
              exit 1
            fi
            sleep 1
          done
          if [ "$ready" != true ]; then
            docker logs "$container"
            exit 1
          fi
          docker exec "$container" gtagate --version
          docker exec "$container" gtacore sing-box version
          docker stop --time 10 "$container"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign and verify candidate digest
        env:
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          image="${IMAGE_REPO}@${DIGEST}"
          cosign sign --yes "$image"
          cosign verify "$image" \
            --certificate-identity-regexp '.*/GTA-God/.github/workflows/docker-build.yml@.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Promote verified digest to release tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          source="${IMAGE_REPO}@${DIGEST}"
          for tag in ${TAGS}; do
            docker buildx imagetools create --tag "$tag" "$source"
            docker buildx imagetools inspect "$tag" >/dev/null
          done
