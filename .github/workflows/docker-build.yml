name: Validate and Publish GTAGod

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'certificate-health-lib.sh'
      - 'docker-entrypoint.sh'
      - 'gtacore-watchdog.sh'
      - 'healthcheck.sh'
      - 'bin/**'
      - 'gateway/**'
      - 'tests/container-data-path.sh'
      - '.dockerignore'
      - '.gitattributes'
      - '.gitignore'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (no cache)'
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.97.1
  DOCKER_BUILD_RECORD_UPLOAD: "false"

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck jq
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal \
            --component clippy --component rustfmt

      - name: Verify release artifact
        run: |
          chmod +x bin/gtacore
          sha256sum --check bin/gtacore.sha256
          actual_sha=$(sha256sum bin/gtacore | awk '{print $1}')
          actual_size=$(stat -c %s bin/gtacore)
          actual_version=$(./bin/gtacore sing-box version | awk 'NR == 1 { print $3 }')
          provenance_sha=$(jq -r .sha256 bin/gtacore.provenance.json)
          provenance_size=$(jq -r .size bin/gtacore.provenance.json)
          provenance_version=$(jq -r .version bin/gtacore.provenance.json)
          provenance_commit=$(jq -r .commit bin/gtacore.provenance.json)
          dockerfile_sha=$(sed -n 's/^ARG GTACORE_SHA256=//p' Dockerfile)
          dockerfile_version=$(sed -n 's/^ARG GTAGOD_VERSION=//p' Dockerfile)
          dockerfile_revision=$(sed -n 's/^ARG GTACORE_REVISION=//p' Dockerfile)
          test "$actual_sha" = "$provenance_sha"
          test "$actual_sha" = "$dockerfile_sha"
          test "$actual_size" = "$provenance_size"
          test "$actual_version" = "$provenance_version"
          test "$actual_version" = "$dockerfile_version"
          test "$provenance_commit" = "$dockerfile_revision"

      - name: Validate runtime scripts
        run: |
          dash -n docker-entrypoint.sh
          dash -n healthcheck.sh
          dash -n gtacore-watchdog.sh
          dash -n certificate-health-lib.sh
          dash -n tests/container-data-path.sh
          shellcheck --shell=dash --severity=warning \
            docker-entrypoint.sh healthcheck.sh gtacore-watchdog.sh \
            certificate-health-lib.sh tests/container-data-path.sh

      - name: Test gtagate
        working-directory: gateway
        run: |
          cargo +"$RUST_TOOLCHAIN" fmt --all -- --check
          cargo +"$RUST_TOOLCHAIN" test --locked --all-targets
          cargo +"$RUST_TOOLCHAIN" clippy --locked --all-targets -- -D warnings

  candidate-image:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Read GTACore metadata
        id: gtacore
        run: |
          chmod +x bin/gtacore
          version=$(./bin/gtacore sing-box version | awk 'NR == 1 { print $3 }')
          commit=$(jq -r .commit bin/gtacore.provenance.json)
          test -n "$version"
          test -n "$commit"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build local candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          build-args: |
            GTAGOD_VERSION=${{ steps.gtacore.outputs.version }}
            GTACORE_REVISION=${{ steps.gtacore.outputs.commit }}
          tags: gtagod:candidate-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect candidate image
        env:
          IMAGE: gtagod:candidate-${{ github.sha }}
        run: |
          docker run --rm --entrypoint /usr/bin/gtagate "$IMAGE" --version
          docker run --rm --entrypoint /usr/bin/gtacore "$IMAGE" sing-box version
          docker run --rm --entrypoint /bin/sh "$IMAGE" -c \
            'test -x /usr/local/bin/docker-entrypoint.sh && \
             test -x /usr/local/bin/healthcheck.sh && \
             test -x /usr/local/bin/gtagod-data-path-check && \
             test -r /usr/local/lib/gtacore-watchdog.sh && \
             test -r /usr/local/lib/gtagod-certificate-health.sh'

  publish:
    needs: [validate, candidate-image]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Read GTACore metadata
        id: gtacore
        run: |
          chmod +x bin/gtacore
          version=$(./bin/gtacore sing-box version | awk 'NR == 1 { print $3 }')
          commit=$(jq -r .commit bin/gtacore.provenance.json)
          test -n "$version"
          test -n "$commit"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare release metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.gtacore.outputs.version }}
            type=raw,value=gtacore-${{ steps.gtacore.outputs.version }}-{{date 'YYYYMMDD'}}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.version=${{ steps.gtacore.outputs.version }}
            org.opencontainers.image.title=gtagod
            org.opencontainers.image.description=GTAGod - GTACore ${{ steps.gtacore.outputs.version }} nine-protocol server + gtagate L4
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/GTAStudio/GTA-God

      - name: Build and push immutable candidate
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          build-args: |
            GTAGOD_VERSION=${{ steps.gtacore.outputs.version }}
            GTACORE_REVISION=${{ steps.gtacore.outputs.commit }}
          provenance: mode=max
          sbom: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod:candidate-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed candidate by digest
        env:
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          image="${IMAGE_REPO}@${DIGEST}"
          docker pull "$image"
          docker run --rm --entrypoint /usr/bin/gtagate "$image" --version
          docker run --rm --entrypoint /usr/bin/gtacore "$image" sing-box version
          docker run --rm --entrypoint /bin/sh "$image" -c \
            'test -x /usr/local/bin/docker-entrypoint.sh && \
             test -x /usr/local/bin/healthcheck.sh && \
             test -x /usr/local/bin/gtagod-data-path-check && \
             test -r /usr/local/lib/gtacore-watchdog.sh && \
             test -r /usr/local/lib/gtagod-certificate-health.sh'

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Sign and verify candidate digest
        env:
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          image="${IMAGE_REPO}@${DIGEST}"
          bundle="${RUNNER_TEMP}/candidate.sigstore.json"
          cosign sign --yes --bundle "$bundle" \
            --registry-referrers-mode=oci-1-1 "$image"
          test -s "$bundle"

          verified=false
          for delay in 1 2 4 8 16; do
            if cosign verify "$image" \
              --certificate-identity-regexp '.*/GTA-God/.github/workflows/docker-build.yml@.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              >/dev/null 2>&1; then
              verified=true
              break
            fi
            sleep "$delay"
          done
          if [ "$verified" != true ]; then
            cosign verify "$image" \
              --certificate-identity-regexp '.*/GTA-God/.github/workflows/docker-build.yml@.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            exit 1
          fi

      - name: Promote verified digest to release tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gtagod
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          source="${IMAGE_REPO}@${DIGEST}"
          for tag in ${TAGS}; do
            docker buildx imagetools create --tag "$tag" "$source"
            docker buildx imagetools inspect "$tag" >/dev/null
          done