name: rust-quality

# gtagate（gateway/）质量门禁：fmt / clippy(-D warnings) / check / test / audit / 锁文件一致性。
# 修复 2026-06-22 审计 #5：此前 CI 只做 docker build+push，Rust 代码无任何质量门禁。

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/rust-quality.yml'
  pull_request:
    paths:
      - 'gateway/**'
      - '.github/workflows/rust-quality.yml'

permissions:
  contents: read

concurrency:
  group: rust-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: gateway
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false # 后续无 git 推送，不让 GITHUB_TOKEN 驻留 .git/config（最小暴露面）

      # 固定到与 Docker 构建一致的 Rust 1.96（edition 2024），避免本地/CI/镜像版本漂移。
      # 注：x86_64-linux 上 aws-lc-rs(非-FIPS) 用预生成 bindings，仅需 ubuntu-latest 自带的 C 工具链，无需额外装 cmake/clang。
      - name: Install Rust 1.96 (rustfmt + clippy)
        run: |
          rustup toolchain install 1.96 --profile minimal
          rustup component add rustfmt clippy --toolchain 1.96
          rustup default 1.96
          rustc --version && cargo --version

      # 缓存 ~/.cargo registry/git + target + cargo bin（cache-bin 默认含 cargo-audit），按 Cargo.lock+rustc 分桶。
      # 冷缓存下 clippy/test/audit 重复全量编译 aws-lc-rs 等是最大 CI 开销，缓存后通常数分钟 → 30-60s。
      - name: Cache cargo (Swatinem/rust-cache)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: gateway

      - name: rustfmt (check)
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      # 不单独跑 cargo check：clippy 是 check 的超集（过 clippy 必过 check），省一轮近全量编译。
      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo audit (RUSTSEC advisories)
        run: |
          # 用 stable 工具链装/跑 cargo-audit，避免其 MSRV 高于钉定的 1.96 时门禁假失败（audit 只读 Cargo.lock，与工具链无关）。
          rustup toolchain install stable --profile minimal
          rustup run stable cargo install cargo-audit --locked
          rustup run stable cargo audit

      - name: verify Cargo.lock is up to date
        run: cargo update --locked --dry-run
